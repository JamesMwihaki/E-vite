<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile · E-vite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            color: #111;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .ascii-frame {
            position: relative;
            border: 1px dashed #111;
            background: #fff;
            font-family: 'Courier New', monospace;
        }
        .ascii-frame > .corner {
            position: absolute;
            line-height: 1;
            font-weight: bold;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .ascii-frame > .corner.tl { top: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.tr { top: -0.55em; right: -0.3ch; }
        .ascii-frame > .corner.bl { bottom: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.br { bottom: -0.55em; right: -0.3ch; }

        .terminal .ascii-frame > .corner { background: #fff; padding: 0 2px; }
        .terminal.ascii-frame > .corner  { background: #f0f0f0; padding: 0 2px; }

        .terminal {
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .section { padding: 16px 22px; }
        .section + .section { border-top: 1px dashed #111; }

        /* Middle content scrolls; topbar + nav-bar stay pinned to the frame. */
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border-top: 1px dashed #111;
            border-bottom: 1px dashed #111;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #111; }
        .section.topbar, .section.nav-bar { flex-shrink: 0; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            gap: 8px;
        }
        .topbar .title { flex: 1; text-align: center; }

        .clickable {
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .clickable:hover { background: #eee; }

        .section-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .section-label::before { content: '[ '; }
        .section-label::after  { content: ' ]'; }

        .avatar-block {
            text-align: center;
        }
        .avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border: 2px solid #111;
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            background: #111;
            color: #fff;
            margin-bottom: 10px;
        }
        .full-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        .handle {
            color: #555;
            margin-top: 2px;
        }
        .joined {
            font-size: 0.85em;
            color: #777;
            margin-top: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }
        .stat {
            padding: 8px;
        }
        .stat .num {
            font-size: 1.6em;
            font-weight: bold;
        }
        .stat .label {
            font-size: 0.8em;
            color: #555;
            text-transform: lowercase;
        }

        .field-label { display: block; margin-bottom: 6px; }
        .input-frame { padding: 6px 10px; margin-bottom: 14px; }

        /* City typeahead under the location input */
        .suggest-wrap { position: relative; margin-bottom: 14px; }
        .suggest-wrap .input-frame { margin-bottom: 0; }
        .suggest-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: #fff;
            border: 1px dashed #111;
            z-index: 10;
            max-height: 180px;
            overflow-y: auto;
        }
        .suggest-item { padding: 6px 10px; cursor: pointer; }
        .suggest-item:hover, .suggest-item.active { background: #111; color: #fff; }
        .input-frame input {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            width: 100%;
        }
        .row { display: flex; gap: 14px; }
        .row > .field-group { flex: 1; min-width: 0; }

        .button-row {
            display: flex;
            justify-content: center;
            margin-top: 4px;
        }
        .ascii-button {
            display: inline-block;
            padding: 8px 22px;
            background: #fff;
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            cursor: pointer;
        }
        .ascii-button:hover { background: #eee; }

        .message {
            text-align: center;
            margin-top: 8px;
            min-height: 1.2em;
            font-size: 0.9em;
        }
        .message.error { color: #a00; }
        .message.success { color: #1d6b2e; }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 4px;
        }
        .nav-item {
            cursor: pointer;
            padding: 2px 6px;
            color: inherit;
            text-decoration: none;
        }
        .nav-item.active { font-weight: bold; background: #111; color: #fff; }
        .nav-item:hover { background: #eee; }
        .nav-item.active:hover { background: #111; color: #fff; }

        /* Desktop nav shows the classic [LABEL]; the glyph keycap is phone-only. */
        .nav-item .key-cap { display: none; }
        .nav-item .key-label::before { content: '['; }
        .nav-item .key-label::after  { content: ']'; }

        @keyframes blink {
            0%, 49%   { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Phones: the pocket terminal — fullscreen session, shell-prompt
           topbar with a blinking cursor, `#` comment headings, keycap nav. */
        @media (max-width: 480px) {
            body { padding: 0; -webkit-tap-highlight-color: transparent; }
            .terminal { max-width: none; border: none; box-shadow: none; }
            .terminal.ascii-frame > .corner { display: none; }
            .section { padding: 12px 14px; }
            .row { flex-direction: column; gap: 0; }
            .stats-grid { grid-template-columns: 1fr; }
            .input-frame input { font-size: 16px; }

            /* Topbar title reads as a shell prompt */
            .topbar .title { text-transform: lowercase; }
            .topbar .title::before { content: '$ '; color: #888; }
            .topbar .title::after {
                content: '█';
                margin-left: 2px;
                animation: blink 1.2s steps(1) infinite;
            }

            /* Section labels read as shell comments */
            .section-label {
                text-align: left;
                border-bottom: 1px dashed #111;
                padding-bottom: 6px;
            }
            .section-label::before { content: '# '; color: #888; }
            .section-label::after  { content: ''; }

            /* Keycap nav: glyph over label, hard shadow that compresses
               when pressed; the active page's key sits half-depressed. */
            .nav-bar {
                gap: 10px;
                padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            }
            .nav-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 9px 2px 8px;
                border: 1px solid #111;
                background: #fff;
                box-shadow: 0 3px 0 #111;
            }
            .nav-item:hover { background: #fff; }
            .nav-item:active { transform: translateY(3px); box-shadow: none; }
            .nav-item .key-cap {
                display: block;
                font-size: 19px;
                font-weight: bold;
                line-height: 1;
            }
            .nav-item .key-label {
                font-size: 8px;
                letter-spacing: 0.5px;
                white-space: nowrap;
            }
            .nav-item .key-label::before,
            .nav-item .key-label::after { content: ''; }
            .nav-item.active {
                background: #111;
                color: #fff;
                transform: translateY(2px);
                box-shadow: 0 1px 0 #111;
            }
            .nav-item.active:hover { background: #111; }

            /* Buttons get keycap depth and physically depress */
            .ascii-button { padding: 12px 20px; box-shadow: 0 2px 0 currentColor; }
            .ascii-button:active { transform: translateY(2px); box-shadow: none; }

            .suggest-item { padding: 10px 12px; }
        }

        /* Wide screens: a touch more room for the form */
        @media (min-width: 900px) {
            .terminal { max-width: 660px; }
        }
    </style>
</head>
<body>
    <div class="terminal ascii-frame">
        <span class="corner tl">+</span>
        <span class="corner tr">+</span>
        <span class="corner bl">+</span>
        <span class="corner br">+</span>

        <div class="section topbar">
            <a href="landing-page.html" class="clickable">&lt; Back</a>
            <span class="title">Profile</span>
            <span class="clickable" id="logout-btn">[LOGOUT]</span>
        </div>

        <main class="content">
        <div class="section avatar-block">
            <div class="avatar" id="avatar">?</div>
            <div class="full-name" id="full-name"></div>
            <div class="handle" id="handle"></div>
            <div class="joined" id="joined"></div>
        </div>

        <div class="section">
            <div class="section-label">Stats</div>
            <div class="stats-grid">
                <div class="stat">
                    <div class="num" id="stat-friends">—</div>
                    <div class="label">friends</div>
                </div>
                <div class="stat">
                    <div class="num" id="stat-created">—</div>
                    <div class="label">created</div>
                </div>
                <div class="stat">
                    <div class="num" id="stat-going">—</div>
                    <div class="label">attending</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-label">Edit Profile</div>

            <div class="row">
                <div class="field-group">
                    <label class="field-label" for="first_name">First name</label>
                    <div class="ascii-frame input-frame">
                        <span class="corner tl">+</span>
                        <span class="corner tr">+</span>
                        <span class="corner bl">+</span>
                        <span class="corner br">+</span>
                        <input type="text" id="first_name" autocomplete="given-name">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="last_name">Last name</label>
                    <div class="ascii-frame input-frame">
                        <span class="corner tl">+</span>
                        <span class="corner tr">+</span>
                        <span class="corner bl">+</span>
                        <span class="corner br">+</span>
                        <input type="text" id="last_name" autocomplete="family-name">
                    </div>
                </div>
            </div>

            <label class="field-label" for="email">Email</label>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <input type="email" id="email" autocomplete="email">
            </div>

            <label class="field-label" for="location">Location — city for nearby event discovery (e.g. Austin, TX)</label>
            <div class="suggest-wrap">
                <div class="ascii-frame input-frame">
                    <span class="corner tl">+</span>
                    <span class="corner tr">+</span>
                    <span class="corner bl">+</span>
                    <span class="corner br">+</span>
                    <input type="text" id="location" autocomplete="off" placeholder="Leave blank to opt out">
                </div>
                <div class="suggest-list" id="location-suggest" hidden></div>
            </div>

            <div class="button-row" style="margin-bottom: 14px;">
                <button type="button" class="ascii-frame ascii-button" id="detect_location_btn">
                    <span class="corner tl">+</span>
                    <span class="corner tr">+</span>
                    <span class="corner bl">+</span>
                    <span class="corner br">+</span>
                    [ ⌖ USE MY LOCATION ]
                </button>
            </div>

            <div class="button-row">
                <button type="button" class="ascii-frame ascii-button" id="save_profile_btn">
                    <span class="corner tl">+</span>
                    <span class="corner tr">+</span>
                    <span class="corner bl">+</span>
                    <span class="corner br">+</span>
                    [ SAVE CHANGES ]
                </button>
            </div>
            <div class="message" id="profile_message"></div>
        </div>

        <div class="section">
            <div class="section-label">Change Password</div>

            <label class="field-label" for="current_password">Current password</label>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <input type="password" id="current_password" autocomplete="current-password">
            </div>

            <label class="field-label" for="new_password">New password (8+ characters)</label>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <input type="password" id="new_password" autocomplete="new-password">
            </div>

            <div class="button-row">
                <button type="button" class="ascii-frame ascii-button" id="save_password_btn">
                    <span class="corner tl">+</span>
                    <span class="corner tr">+</span>
                    <span class="corner bl">+</span>
                    <span class="corner br">+</span>
                    [ UPDATE PASSWORD ]
                </button>
            </div>
            <div class="message" id="password_message"></div>
        </div>
        </main>

        <div class="section nav-bar">
            <a href="landing-page.html" class="nav-item"><span class="key-cap">~</span><span class="key-label">HOME</span></a>
            <a href="my-evites.html" class="nav-item"><span class="key-cap">&#9993;&#xFE0E;</span><span class="key-label">MY E-VITES</span></a>
            <a href="tree.html" class="nav-item"><span class="key-cap">&Psi;</span><span class="key-label">MY TREE</span></a>
            <a href="profile.html" class="nav-item active"><span class="key-cap">@</span><span class="key-label">PROFILE</span></a>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
