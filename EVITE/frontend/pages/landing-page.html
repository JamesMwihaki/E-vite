<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-vite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            color: #111;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* ASCII-styled frame: dashed CSS borders + `+` glyphs at the 4 corners. */
        .ascii-frame {
            position: relative;
            border: 1px dashed #111;
            background: #fff;
            font-family: 'Courier New', monospace;
        }
        .ascii-frame > .corner {
            position: absolute;
            line-height: 1;
            font-weight: bold;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .ascii-frame > .corner.tl { top: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.tr { top: -0.55em; right: -0.3ch; }
        .ascii-frame > .corner.bl { bottom: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.br { bottom: -0.55em; right: -0.3ch; }

        /* Corners INSIDE the white terminal mask against white. */
        .terminal .ascii-frame > .corner { background: #fff; padding: 0 2px; }
        /* The outer terminal frame's corners sit on the gray body background. */
        .terminal.ascii-frame > .corner { background: #f0f0f0; padding: 0 2px; }

        .terminal {
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .section {
            padding: 14px 20px;
        }

        /* Horizontal divider between sections — dashed to match the frame style. */
        .section + .section {
            border-top: 1px dashed #111;
        }

        /* Middle content scrolls; topbar + nav-bar stay pinned to the frame. */
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border-top: 1px dashed #111;
            border-bottom: 1px dashed #111;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #111; }
        .section.topbar, .section.nav-bar { flex-shrink: 0; }

        .topbar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .clickable {
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .clickable:hover { background: #eee; }

        .welcome {
            text-align: center;
            padding: 20px;
        }

        .cta-button {
            display: block;
            text-align: center;
            padding: 12px;
            background: #fafafa;
        }
        .cta-button:hover { background: #eaeaea; }

        .section-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .section-label::before { content: '[ '; }
        .section-label::after  { content: ' ]'; }

        /* Date filter bar */
        .filter-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: none;
            color: #111;
            font-family: inherit;
            font-size: inherit;
            padding: 2px 4px;
            cursor: pointer;
        }
        .filter-btn:hover { background: #eee; }
        .filter-btn.active { background: #111; color: #fff; }
        .filter-dates {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .filter-dates input[type="date"] {
            font-family: inherit;
            font-size: 0.9em;
            border: 1px dashed #111;
            background: #fff;
            color: #111;
            padding: 2px 6px;
        }

        .hidden { display: none; }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        /* Landing page: cap each section so only ~1-2 cards show; scroll for more. */
        .event-list.scrollable {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 6px;
        }
        /* When the other section has nothing to show, let this one take the
           whole page and scroll with it. */
        .event-list.scrollable.expanded { max-height: none; }
        .event-list.scrollable::-webkit-scrollbar { width: 6px; }
        .event-list.scrollable::-webkit-scrollbar-track { background: transparent; }
        .event-list.scrollable::-webkit-scrollbar-thumb { background: #111; }
        .event-empty {
            text-align: center;
            color: #777;
            font-style: italic;
            padding: 8px 4px;
        }
        .event-card {
            padding: 12px 14px;
            display: grid;
            gap: 4px;
        }
        .event-card .field {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .event-card {
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .event-card:hover { background: #f5f5f5; }
        .event-card:hover > .corner { background: #f5f5f5; }
        .event-card:focus-visible { outline: 2px solid #111; }

        .rsvp-block {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .rsvp-label {
            font-weight: bold;
            text-align: center;
            margin-bottom: 4px;
        }
        .rsvp-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .rsvp-btn {
            background: transparent;
            border: 1px dashed #111;
            color: #111;
            font-family: inherit;
            font-size: inherit;
            padding: 4px 14px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .rsvp-btn:hover { background: #eee; }
        .rsvp-btn.selected { background: #111; color: #fff; }
        .rsvp-btn.selected:hover { background: #111; }
        .rsvp-status {
            text-align: center;
            font-size: 0.85em;
            color: #1d6b2e;
            margin-top: 2px;
            min-height: 1em;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 4px;
        }
        .nav-item {
            cursor: pointer;
            padding: 2px 6px;
            color: inherit;
            text-decoration: none;
        }
        .nav-item.active {
            font-weight: bold;
            background: #111;
            color: #fff;
        }
        .nav-item:hover { background: #eee; }
        .nav-item.active:hover { background: #111; color: #fff; }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .section { padding: 12px 14px; }
            .nav-bar { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="terminal ascii-frame">
        <span class="corner tl">+</span>
        <span class="corner tr">+</span>
        <span class="corner bl">+</span>
        <span class="corner br">+</span>

        <div class="section topbar">
            <a href="landing-page.html" class="clickable">E-vite</a>
            <span class="clickable" id="logout-btn">[LOGOUT]</span>
        </div>

        <main class="content">
        <div class="section welcome">
            <span id="welcome-text"></span>
        </div>

        <div class="section">
            <a href="../pages/create-event.html" class="ascii-frame cta-button clickable">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                + CREATE NEW EVENT
            </a>
        </div>

        <div class="section" id="filter-section">
            <div class="filter-row">
                <button type="button" class="filter-btn active" data-range="all">[ ALL ]</button>
                <button type="button" class="filter-btn" data-range="today">[ TODAY ]</button>
                <button type="button" class="filter-btn" data-range="week">[ 7 DAYS ]</button>
                <button type="button" class="filter-btn" data-range="month">[ 30 DAYS ]</button>
            </div>
            <div class="filter-dates">
                <label for="filter-from">From</label>
                <input type="date" id="filter-from">
                <label for="filter-to">To</label>
                <input type="date" id="filter-to">
            </div>
        </div>

        <div class="section" id="exclusive-section">
            <div class="section-label">Exclusive E-vites</div>
            <div id="exclusive-list" class="event-list scrollable"></div>
        </div>

        <div class="section" id="public-section">
            <div class="section-label">Public E-vites</div>
            <div id="public-list" class="event-list scrollable"></div>
        </div>
        </main>

        <div class="section nav-bar">
            <a href="landing-page.html" class="nav-item active">[HOME]</a>
            <a href="my-evites.html" class="nav-item">[MY E-VITES]</a>
            <a href="tree.html" class="nav-item">[MY TREE]</a>
            <a href="profile.html" class="nav-item">[PROFILE]</a>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/events-page.js"></script>
</body>
</html>
