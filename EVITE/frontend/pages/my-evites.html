<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My E-vites · E-vite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            color: #111;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .ascii-frame {
            position: relative;
            border: 1px dashed #111;
            background: #fff;
            font-family: 'Courier New', monospace;
        }
        .ascii-frame > .corner {
            position: absolute;
            line-height: 1;
            font-weight: bold;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .ascii-frame > .corner.tl { top: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.tr { top: -0.55em; right: -0.3ch; }
        .ascii-frame > .corner.bl { bottom: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.br { bottom: -0.55em; right: -0.3ch; }

        .terminal .ascii-frame > .corner { background: #fff; padding: 0 2px; }
        .terminal.ascii-frame > .corner  { background: #f0f0f0; padding: 0 2px; }

        .terminal {
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .section { padding: 14px 20px; }
        .section + .section { border-top: 1px dashed #111; }

        /* Middle content scrolls; topbar + nav-bar stay pinned to the frame. */
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border-top: 1px dashed #111;
            border-bottom: 1px dashed #111;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #111; }
        .section.topbar, .section.nav-bar { flex-shrink: 0; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            gap: 8px;
        }
        .topbar .title { flex: 1; text-align: center; }

        .clickable {
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .clickable:hover { background: #eee; }

        .section-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .section-label::before { content: '[ '; }
        .section-label::after  { content: ' ]'; }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .event-empty {
            text-align: center;
            color: #777;
            font-style: italic;
            padding: 8px 4px;
        }
        .event-card {
            padding: 12px 14px;
            display: grid;
            gap: 4px;
        }
        .event-card .field {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .event-card {
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .event-card:hover { background: #f5f5f5; }
        .event-card:hover > .corner { background: #f5f5f5; }
        .event-card:focus-visible { outline: 2px solid #111; }

        .rsvp-block {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .rsvp-label {
            font-weight: bold;
            text-align: center;
            margin-bottom: 4px;
        }
        .rsvp-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .rsvp-btn {
            background: transparent;
            border: 1px dashed #111;
            color: #111;
            font-family: inherit;
            font-size: inherit;
            padding: 4px 14px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .rsvp-btn:hover { background: #eee; }
        .rsvp-btn.selected { background: #111; color: #fff; }
        .rsvp-btn.selected:hover { background: #111; }
        .rsvp-status {
            text-align: center;
            font-size: 0.85em;
            color: #1d6b2e;
            margin-top: 2px;
            min-height: 1em;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 4px;
        }
        .nav-item {
            cursor: pointer;
            padding: 2px 6px;
            color: inherit;
            text-decoration: none;
        }
        .nav-item.active {
            font-weight: bold;
            background: #111;
            color: #fff;
        }
        .nav-item:hover { background: #eee; }
        .nav-item.active:hover { background: #111; color: #fff; }

        /* Desktop nav shows the classic [LABEL]; the glyph keycap is phone-only. */
        .nav-item .key-cap { display: none; }
        .nav-item .key-label::before { content: '['; }
        .nav-item .key-label::after  { content: ']'; }

        @keyframes blink {
            0%, 49%   { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Phones: the pocket terminal — fullscreen session, shell-prompt
           topbar with a blinking cursor, `#` comment headings, keycap nav. */
        @media (max-width: 480px) {
            body { padding: 0; -webkit-tap-highlight-color: transparent; }
            .terminal { max-width: none; border: none; box-shadow: none; }
            .terminal.ascii-frame > .corner { display: none; }
            .section { padding: 12px 14px; }
            input, textarea { font-size: 16px; }

            /* Topbar title reads as a shell prompt */
            .topbar .title { text-transform: lowercase; }
            .topbar .title::before { content: '$ '; color: #888; }
            .topbar .title::after {
                content: '█';
                margin-left: 2px;
                animation: blink 1.2s steps(1) infinite;
            }

            /* Section labels read as shell comments */
            .section-label {
                text-align: left;
                border-bottom: 1px dashed #111;
                padding-bottom: 6px;
            }
            .section-label::before { content: '# '; color: #888; }
            .section-label::after  { content: ''; }

            /* Cards flash inverted on touch, like selected terminal text */
            .event-card:active,
            .event-card:active > .corner { background: #111; color: #fff; }

            /* Keycap nav: glyph over label, hard shadow that compresses
               when pressed; the active page's key sits half-depressed. */
            .nav-bar {
                gap: 10px;
                padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            }
            .nav-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 9px 2px 8px;
                border: 1px solid #111;
                background: #fff;
                box-shadow: 0 3px 0 #111;
            }
            .nav-item:hover { background: #fff; }
            .nav-item:active { transform: translateY(3px); box-shadow: none; }
            .nav-item .key-cap {
                display: block;
                font-size: 19px;
                font-weight: bold;
                line-height: 1;
            }
            .nav-item .key-label {
                font-size: 8px;
                letter-spacing: 0.5px;
                white-space: nowrap;
            }
            .nav-item .key-label::before,
            .nav-item .key-label::after { content: ''; }
            .nav-item.active {
                background: #111;
                color: #fff;
                transform: translateY(2px);
                box-shadow: 0 1px 0 #111;
            }
            .nav-item.active:hover { background: #111; }

            .rsvp-btn { padding: 10px 18px; box-shadow: 0 2px 0 currentColor; }
            .rsvp-btn:active { transform: translateY(2px); box-shadow: none; }
            .rsvp-btn.selected { box-shadow: none; }
        }

        /* Wide screens: cards in two columns */
        @media (min-width: 900px) {
            .terminal { max-width: 920px; }
            .event-list {
                display: grid;
                grid-template-columns: 1fr 1fr;
                align-items: start;
            }
        }
    </style>
</head>
<body>
    <div class="terminal ascii-frame">
        <span class="corner tl">+</span>
        <span class="corner tr">+</span>
        <span class="corner bl">+</span>
        <span class="corner br">+</span>

        <div class="section topbar">
            <a href="landing-page.html" class="clickable">&lt; Back</a>
            <span class="title">My E-vites</span>
            <span class="clickable" id="logout-btn">[LOGOUT]</span>
        </div>

        <main class="content">
        <div class="section">
            <div class="section-label">Exclusive E-vites</div>
            <div id="exclusive-list" class="event-list"></div>
        </div>
        </main>

        <div class="section nav-bar">
            <a href="landing-page.html" class="nav-item"><span class="key-cap">~</span><span class="key-label">HOME</span></a>
            <a href="my-evites.html" class="nav-item active"><span class="key-cap">&#9993;&#xFE0E;</span><span class="key-label">MY E-VITES</span></a>
            <a href="tree.html" class="nav-item"><span class="key-cap">&Psi;</span><span class="key-label">MY TREE</span></a>
            <a href="profile.html" class="nav-item"><span class="key-cap">@</span><span class="key-label">PROFILE</span></a>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/events-page.js"></script>
</body>
</html>
