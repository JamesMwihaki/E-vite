<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Tree · E-vite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            color: #111;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .ascii-frame {
            position: relative;
            border: 1px dashed #111;
            background: #fff;
            font-family: 'Courier New', monospace;
        }
        .ascii-frame > .corner {
            position: absolute;
            line-height: 1;
            font-weight: bold;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .ascii-frame > .corner.tl { top: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.tr { top: -0.55em; right: -0.3ch; }
        .ascii-frame > .corner.bl { bottom: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.br { bottom: -0.55em; right: -0.3ch; }

        .terminal .ascii-frame > .corner { background: #fff; padding: 0 2px; }
        .terminal.ascii-frame > .corner  { background: #f0f0f0; padding: 0 2px; }

        .terminal {
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .section { padding: 14px 20px; }
        .section + .section { border-top: 1px dashed #111; }

        /* Middle content scrolls; topbar + nav-bar stay pinned to the frame. */
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border-top: 1px dashed #111;
            border-bottom: 1px dashed #111;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #111; }
        .section.topbar, .section.nav-bar { flex-shrink: 0; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            gap: 8px;
        }
        .topbar .title { flex: 1; text-align: center; }

        .clickable {
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .clickable:hover { background: #eee; }

        .section-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .section-label::before { content: '[ '; }
        .section-label::after  { content: ' ]'; }

        .input-frame {
            padding: 6px 10px;
            margin-bottom: 14px;
        }
        .input-frame input {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            width: 100%;
        }

        .person-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* The Tree visualization — procedural SVG */
        .tree-viewport {
            position: relative;
            width: 100%;
            height: 420px;
            overflow: hidden;
            background: #fafafa;
            border: 1px dashed #111;
            cursor: grab;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        .tree-viewport.dragging { cursor: grabbing; }
        .tree-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        #tree-canvas {
            transform-origin: 0 0;
            transform-box: view-box;
            will-change: transform;
        }

        /* Graph edges */
        .graph-edge { fill: none; stroke: #111; }
        .graph-edge.primary { stroke-width: 1.6; opacity: 0.85; }
        .graph-edge.mutual  { stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.55; }
        .graph-edge.sub     { stroke-width: 1; opacity: 0.6; }

        /* Graph nodes */
        .graph-node {
            cursor: pointer;
            transform-box: view-box;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.32s ease;
        }
        .graph-node.entering { opacity: 0; }
        .graph-node.exiting  { opacity: 0; pointer-events: none; }
        .edges-group { transition: opacity 0.32s ease; }

        .graph-node-bg {
            fill: #fff;
            stroke: #111;
            stroke-width: 2;
            transition: fill 0.1s ease, r 0.5s ease;
        }
        .graph-node:hover .graph-node-bg { fill: #eee; }
        .graph-node.center  .graph-node-bg,
        .graph-node.expanded .graph-node-bg { fill: #111; stroke: #111; }

        .graph-node-initial {
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: bold;
            fill: #111;
            pointer-events: none;
        }
        .graph-node.center .graph-node-initial,
        .graph-node.expanded .graph-node-initial { fill: #fff; }

        .graph-node-label {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            fill: #333;
            pointer-events: none;
        }

        /* Per-node remove (×) button — appears on hover for direct friends only */
        .node-remove {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .graph-node:hover .node-remove {
            opacity: 1;
            pointer-events: auto;
        }
        .node-remove circle {
            fill: #111;
            stroke: #fafafa;
            stroke-width: 1.5;
            cursor: pointer;
        }
        .node-remove circle:hover { fill: #a00; }
        .node-remove text {
            fill: #fafafa;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
        }
        .tree-controls {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }
        .tree-controls button {
            background: #fff;
            border: 1px dashed #111;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            line-height: 1;
            color: #111;
        }
        .tree-controls button:hover { background: #eee; }
        .tree-hint {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 0.75em;
            color: #888;
            pointer-events: none;
            font-style: italic;
        }
        .tree-hint::before { content: 'drag to pan · wheel to zoom · click a node to expand'; }
        .leaf-overflow {
            text-align: center;
            margin-top: 6px;
            color: #555;
            font-size: 0.85em;
            font-style: italic;
        }
        .leaf-info {
            text-align: center;
            margin-top: 10px;
            min-height: 1.6em;
            font-size: 0.95em;
        }
        .leaf-info-empty {
            color: #999;
            font-style: italic;
        }
        .leaf-info-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px dashed #111;
            padding: 4px 10px;
        }
        .leaf-info-pill .name { font-weight: bold; }
        .leaf-info-pill .handle { color: #666; font-size: 0.9em; }
        .leaf-info-pill .remove-btn {
            background: none;
            border: 1px dashed #a00;
            color: #a00;
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            padding: 2px 8px;
        }
        .leaf-info-pill .remove-btn:hover { background: #fee; }

        .person-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
        }

        .person-info { min-width: 0; flex: 1; }
        .person-name {
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .person-handle {
            font-size: 0.85em;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .person-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            color: #777;
            font-style: italic;
            padding: 8px 4px;
        }

        .ascii-button {
            display: inline-block;
            padding: 4px 10px;
            background: #fff;
            font-family: inherit;
            font-size: 0.85em;
            color: inherit;
            cursor: pointer;
            line-height: 1.3;
        }
        .ascii-button:hover:not(:disabled) { background: #eee; }
        .ascii-button:disabled {
            cursor: default;
            color: #999;
            background: #f9f9f9;
        }
        .ascii-button.danger:hover:not(:disabled) { background: #fee; }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 4px;
        }
        .nav-item {
            cursor: pointer;
            padding: 2px 6px;
            color: inherit;
            text-decoration: none;
        }
        .nav-item.active {
            font-weight: bold;
            background: #111;
            color: #fff;
        }
        .nav-item:hover { background: #eee; }
        .nav-item.active:hover { background: #111; color: #fff; }

        /* Desktop nav shows the classic [LABEL]; the glyph keycap is phone-only. */
        .nav-item .key-cap { display: none; }
        .nav-item .key-label::before { content: '['; }
        .nav-item .key-label::after  { content: ']'; }

        @keyframes blink {
            0%, 49%   { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Phones: the pocket terminal — fullscreen session, shell-prompt
           topbar with a blinking cursor, `#` comment headings, keycap nav. */
        @media (max-width: 480px) {
            body { padding: 0; -webkit-tap-highlight-color: transparent; }
            .terminal { max-width: none; border: none; box-shadow: none; }
            .terminal.ascii-frame > .corner { display: none; }
            .section { padding: 12px 14px; }
            input { font-size: 16px; }

            /* Topbar title reads as a shell prompt */
            .topbar .title { text-transform: lowercase; }
            .topbar .title::before { content: '$ '; color: #888; }
            .topbar .title::after {
                content: '█';
                margin-left: 2px;
                animation: blink 1.2s steps(1) infinite;
            }

            /* Section labels read as shell comments */
            .section-label {
                text-align: left;
                border-bottom: 1px dashed #111;
                padding-bottom: 6px;
            }
            .section-label::before { content: '# '; color: #888; }
            .section-label::after  { content: ''; }

            /* Keycap nav: glyph over label, hard shadow that compresses
               when pressed; the active page's key sits half-depressed. */
            .nav-bar {
                gap: 10px;
                padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            }
            .nav-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 9px 2px 8px;
                border: 1px solid #111;
                background: #fff;
                box-shadow: 0 3px 0 #111;
            }
            .nav-item:hover { background: #fff; }
            .nav-item:active { transform: translateY(3px); box-shadow: none; }
            .nav-item .key-cap {
                display: block;
                font-size: 19px;
                font-weight: bold;
                line-height: 1;
            }
            .nav-item .key-label {
                font-size: 8px;
                letter-spacing: 0.5px;
                white-space: nowrap;
            }
            .nav-item .key-label::before,
            .nav-item .key-label::after { content: ''; }
            .nav-item.active {
                background: #111;
                color: #fff;
                transform: translateY(2px);
                box-shadow: 0 1px 0 #111;
            }
            .nav-item.active:hover { background: #111; }

            .person-row { flex-wrap: wrap; }
            .person-actions button { padding: 8px 12px; }
            .tree-controls button { padding: 8px 12px; }
            .tree-viewport { height: 360px; }
            .tree-hint::before { content: 'drag to pan · pinch to zoom · tap a node to expand'; }
        }

        /* Wide screens: requests and search side by side, the tree gets the
           full width and more height to roam. */
        @media (min-width: 900px) {
            .terminal { max-width: 1100px; }
            .content {
                display: grid;
                grid-template-columns: 1fr 1fr;
                align-content: start;
            }
            .content > .section { border-top: 1px dashed #111; }
            .content > .section:first-child { border-top: none; }
            .content > .section:nth-child(2) {
                border-top: none;
                border-left: 1px dashed #111;
            }
            .content > .section:nth-child(3) { grid-column: 1 / -1; }
            .tree-viewport { height: 620px; }
        }
    </style>
</head>
<body>
    <div class="terminal ascii-frame">
        <span class="corner tl">+</span>
        <span class="corner tr">+</span>
        <span class="corner bl">+</span>
        <span class="corner br">+</span>

        <div class="section topbar">
            <a href="landing-page.html" class="clickable">&lt; Back</a>
            <span class="title">My Tree</span>
            <span class="clickable" id="logout-btn">[LOGOUT]</span>
        </div>

        <main class="content">
        <div class="section">
            <div class="section-label">Pending Requests</div>
            <div id="requests-list" class="person-list"></div>
        </div>

        <div class="section">
            <div class="section-label">Find Friends</div>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <input type="text" id="search-input" placeholder="Search by username, name, or email...">
            </div>
            <div id="search-results" class="person-list"></div>
        </div>

        <div class="section">
            <div class="section-label">Your Tree</div>
            <div class="tree-viewport" id="tree-viewport">
                <svg id="tree-svg" class="tree-svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid meet">
                    <g id="tree-canvas"></g>
                </svg>
                <span class="tree-hint"></span>
                <div class="tree-controls">
                    <button type="button" data-act="home"     title="Back to my tree" id="home-btn">⌂</button>
                    <button type="button" data-act="zoom-out" title="Zoom out">−</button>
                    <button type="button" data-act="zoom-in"  title="Zoom in">+</button>
                    <button type="button" data-act="reset"    title="Reset view">↻</button>
                </div>
            </div>
            <div class="leaf-overflow" id="leaf-overflow"></div>
            <div class="leaf-info" id="leaf-info"></div>
        </div>
        </main>

        <div class="section nav-bar">
            <a href="landing-page.html" class="nav-item"><span class="key-cap">~</span><span class="key-label">HOME</span></a>
            <a href="my-evites.html" class="nav-item"><span class="key-cap">&#9993;&#xFE0E;</span><span class="key-label">MY E-VITES</span></a>
            <a href="tree.html" class="nav-item active"><span class="key-cap">&Psi;</span><span class="key-label">MY TREE</span></a>
            <a href="profile.html" class="nav-item"><span class="key-cap">@</span><span class="key-label">PROFILE</span></a>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/tree.js"></script>
</body>
</html>
