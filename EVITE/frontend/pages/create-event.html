<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event · E-vite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            color: #111;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* ASCII-styled frame: dashed CSS borders + `+` glyphs at the 4 corners. */
        .ascii-frame {
            position: relative;
            border: 1px dashed #111;
            background: #fff;
            font-family: 'Courier New', monospace;
        }
        .ascii-frame > .corner {
            position: absolute;
            line-height: 1;
            font-weight: bold;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .ascii-frame > .corner.tl { top: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.tr { top: -0.55em; right: -0.3ch; }
        .ascii-frame > .corner.bl { bottom: -0.55em; left: -0.3ch;  }
        .ascii-frame > .corner.br { bottom: -0.55em; right: -0.3ch; }

        /* Corners INSIDE the white terminal mask against white. */
        .terminal .ascii-frame > .corner { background: #fff; padding: 0 2px; }
        /* The outer terminal frame's corners sit on the gray body background. */
        .terminal.ascii-frame > .corner { background: #f0f0f0; padding: 0 2px; }

        .terminal {
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .section { padding: 14px 20px; }
        .section + .section { border-top: 1px dashed #111; }

        /* Middle content scrolls; topbar + nav-bar stay pinned to the frame. */
        .content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border-top: 1px dashed #111;
            border-bottom: 1px dashed #111;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #111; }
        .section.topbar, .section.nav-bar { flex-shrink: 0; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            gap: 8px;
        }
        .topbar .title { flex: 1; text-align: center; }

        .clickable {
            cursor: pointer;
            color: inherit;
            text-decoration: none;
        }
        .clickable:hover { background: #eee; }

        .field-label {
            display: block;
            margin-bottom: 6px;
        }

        .hidden { display: none !important; }
        .prefill-note {
            text-align: center;
            font-size: 0.85em;
            font-style: italic;
            color: #555;
            border: 1px dashed #999;
            padding: 6px 10px;
            margin-bottom: 14px;
        }

        .input-frame {
            padding: 6px 10px;
            margin-bottom: 14px;
        }
        .input-frame:last-child { margin-bottom: 0; }
        .input-frame input,
        .input-frame textarea {
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            width: 100%;
        }
        .input-frame textarea { resize: vertical; min-height: 2.5em; }

        .row { display: flex; gap: 14px; }
        .row > .field-group { flex: 1; min-width: 0; }

        /* Unified add-people picker (shared look with the event page) */
        .invite-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .invite-chips:empty { display: none; }
        .invite-chip {
            border: 1px dashed #111;
            padding: 2px 8px;
            display: inline-flex;
            gap: 7px;
            align-items: center;
            font-size: 0.9em;
        }
        .invite-chip.user { background: #111; color: #fff; }
        .invite-chip .chip-x { cursor: pointer; font-weight: bold; }
        .invite-chip .chip-x:hover { opacity: 0.7; }
        .suggest-wrap { position: relative; margin-bottom: 6px; }
        .suggest-wrap .input-frame { margin-bottom: 0; }
        .suggest-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: #fff;
            border: 1px dashed #111;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
        }
        .suggest-item {
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .suggest-item:hover, .suggest-item.active { background: #111; color: #fff; }
        .suggest-item .sub { color: #888; font-size: 0.85em; }
        .suggest-item:hover .sub, .suggest-item.active .sub { color: #ccc; }
        .suggest-item.email-item { font-style: italic; }
        .picker-meta {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 6px;
            min-height: 1em;
        }

        .event-type-row {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .ascii-button {
            display: inline-block;
            padding: 8px 18px;
            background: #fff;
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            cursor: pointer;
        }
        .ascii-button:hover { background: #eee; }

        .message {
            text-align: center;
            margin-top: 8px;
            min-height: 1.2em;
            font-size: 0.9em;
        }
        .message.error { color: #a00; }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 4px;
        }
        .nav-item { cursor: pointer; padding: 2px 6px; color: inherit; text-decoration: none; }
        .nav-item.active { font-weight: bold; background: #111; color: #fff; }
        .nav-item:hover { background: #eee; }
        .nav-item.active:hover { background: #111; color: #fff; }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .section { padding: 12px 14px; }
            .row { flex-direction: column; gap: 0; }
            .nav-bar { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="terminal ascii-frame">
        <span class="corner tl">+</span>
        <span class="corner tr">+</span>
        <span class="corner bl">+</span>
        <span class="corner br">+</span>

        <div class="section topbar">
            <a href="landing-page.html" class="clickable">&lt; Back</a>
            <span class="title">Create Event</span>
            <span class="clickable" id="logout-btn">[LOGOUT]</span>
        </div>

        <main class="content">
        <div class="section">
            <div class="prefill-note hidden" id="prefill-note"></div>
            <label class="field-label" for="event_name">Event Title</label>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <input type="text" id="event_name" placeholder="Enter event title...">
            </div>

            <label class="field-label" for="eventDescription">Description</label>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <textarea id="eventDescription" placeholder="Tell guests about your event..."></textarea>
            </div>

            <div class="row">
                <div class="field-group">
                    <label class="field-label" for="event_date">Date</label>
                    <div class="ascii-frame input-frame">
                        <span class="corner tl">+</span>
                        <span class="corner tr">+</span>
                        <span class="corner bl">+</span>
                        <span class="corner br">+</span>
                        <input type="date" id="event_date">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="eventTime">Time</label>
                    <div class="ascii-frame input-frame">
                        <span class="corner tl">+</span>
                        <span class="corner tr">+</span>
                        <span class="corner bl">+</span>
                        <span class="corner br">+</span>
                        <input type="time" id="eventTime">
                    </div>
                </div>
            </div>

            <label class="field-label" for="event_location">Location</label>
            <div class="ascii-frame input-frame">
                <span class="corner tl">+</span>
                <span class="corner tr">+</span>
                <span class="corner bl">+</span>
                <span class="corner br">+</span>
                <input type="text" id="event_location" placeholder="Address or venue name...">
            </div>

            <label class="field-label">Event Type</label>
            <label class="event-type-row">
                <input type="checkbox" id="private" name="eventType" value="private" checked>
                Private - Invitation only
            </label>
        </div>

        <div class="section">
            <label class="field-label" for="invite-input">Invite people — type a name, @username, or email</label>
            <div class="invite-chips" id="invite-chips"></div>
            <div class="suggest-wrap">
                <div class="ascii-frame input-frame">
                    <span class="corner tl">+</span>
                    <span class="corner tr">+</span>
                    <span class="corner bl">+</span>
                    <span class="corner br">+</span>
                    <input type="text" id="invite-input" autocomplete="off" placeholder="Start typing to add guests…">
                </div>
                <div class="suggest-list" id="invite-suggest" hidden></div>
            </div>
            <div class="picker-meta" id="picker-meta"></div>
        </div>

        <div class="section">
            <div class="button-row">
                <button type="button" class="ascii-frame ascii-button" id="create_event">
                    <span class="corner tl">+</span>
                    <span class="corner tr">+</span>
                    <span class="corner bl">+</span>
                    <span class="corner br">+</span>
                    CREATE EVENT
                </button>
            </div>
            <div class="message" id="create_message"></div>
        </div>
        </main>

        <div class="section nav-bar">
            <a href="landing-page.html" class="nav-item">[HOME]</a>
            <a href="my-evites.html" class="nav-item">[MY E-VITES]</a>
            <a href="tree.html" class="nav-item">[MY TREE]</a>
            <a href="profile.html" class="nav-item">[PROFILE]</a>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/invite-picker.js"></script>
    <script src="../js/create-event.js"></script>
</body>
</html>
